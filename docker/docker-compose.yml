# docker/docker-compose.yml — PRODUCTION (Coolify, local file storage)
#
# Fixed vs. the upstream dev file:
#   - build context changed from ".." to "." (resolves correctly under Coolify)
#   - removed all host "ports:" (Coolify's proxy routes; DB/Redis stay private)
#   - removed the source bind-mounts + anonymous node_modules (those negate the build)
#   - removed MinIO (you're on local storage)
#   - secrets/URLs now come from env / Coolify magic vars instead of being hardcoded
#
# [CONFIRM] markers = values that live inside the two Dockerfiles. See chat notes.

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-formgrid}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./packages/api/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: production          # [CONFIRM] real production stage name in packages/api/Dockerfile
    restart: unless-stopped
    expose:
      - "4000"                    # app listens on 4000 internally (PORT=4000)
    environment:
      - SERVICE_FQDN_BACKEND_4000 # Coolify gives backend a public https domain -> container :4000
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=mysql://${MYSQL_USER:-app_user}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-formgrid}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - APP_URL=${SERVICE_FQDN_BACKEND_4000}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-console}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-FormGrid <noreply@example.com>}
      # Local storage: the named volume below MUST be mounted at exactly UPLOAD_PATH
      - FILE_STORAGE_TYPE=local
      - UPLOAD_PATH=/app/uploads
      - MAX_FILE_SIZE=10485760
      - MAX_FILES=10
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # [CONFIRM] If the production image does NOT run migrations on boot, uncomment one
    # of these (whichever matches what's in the prod image):
    # command: sh -c "npx prisma migrate deploy && pnpm run start"
    # command: sh -c "npx prisma migrate deploy && node dist/index.js"

  frontend:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      target: production          # [CONFIRM] real production stage name in apps/dashboard/Dockerfile
      args:
        # Vite bakes this at BUILD time. [CONFIRM] the dashboard Dockerfile declares
        # `ARG VITE_API_BASE_URL` before `pnpm build`, or this value won't reach the app.
        VITE_API_BASE_URL: ${SERVICE_FQDN_BACKEND_4000}
    restart: unless-stopped
    expose:
      - "80"                      # [CONFIRM] port the prod frontend serves on (nginx=80, `serve`=3000, vite preview=4173)
    environment:
      - SERVICE_FQDN_FRONTEND_80  # [CONFIRM] the port suffix here must match the expose port above
    depends_on:
      - backend

  queue-worker:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: production          # [CONFIRM] same stage as backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER:-app_user}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-formgrid}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-console}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-FormGrid <noreply@example.com>}
      - FILE_STORAGE_TYPE=local
      - UPLOAD_PATH=/app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # [CONFIRM] In the prod image, is pnpm present? If not, use the compiled entry, e.g.
    # command: ["node", "dist/worker.js"]
    command: ["pnpm", "run", "worker"]

# file-cleanup (upstream had it under profile: maintenance) is intentionally omitted.
# Better as a Coolify Scheduled Task running: pnpm run cleanup

volumes:
  mysql_data:
  redis_data:
  uploads_data:
